name: Count File Lines
on:
  push:
    branches:
      - fleet-temp-1776012231519
jobs:
  count-lines:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        run: git clone https://github.com/k0inwork/test.git
      - name: Count all file lines
        run: |
          echo "=== Per-file line count ==="
          find test -type f -exec wc -l {} +
          echo "=== Total line count ==="
          find test -type f -exec cat {} + | wc -l
