name: Count Files
on:
  workflow_dispatch: {}
jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        run: git clone https://github.com/k0inwork/test.git repo
      - name: Count all files
        run: |
          cd repo
          FILE_COUNT=$(find . -type f | wc -l)
          echo "FILE_COUNT=$FILE_COUNT"
          echo "Total file count: $FILE_COUNT"
