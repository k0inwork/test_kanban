name: Count Files
on:
  workflow_dispatch: {}
jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo and count files
        run: |
          git clone https://github.com/k0inwork/test.git repo
          cd repo
          FILE_COUNT=$(find . -not -path './.git/*' -type f | wc -l)
          echo "FILE_COUNT=$FILE_COUNT"
          echo "---FILE LIST---"
          find . -not -path './.git/*' -type f
