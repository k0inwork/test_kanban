name: Count Files
on:
  push:
    branches:
      - fleet-temp-1776009946717
jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and count
        run: |
          git clone https://github.com/k0inwork/test.git repo
          COUNT=$(find repo -not -path '*/.git/*' -type f | wc -l)
          echo "FILE_COUNT=$COUNT"
