name: Count Files
on:
  workflow_dispatch: {}
jobs:
  count-files:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and count files
        run: |
          git clone https://github.com/k0inwork/test.git repo
          FILE_COUNT=$(find repo -not -path '*/.git/*' -type f | wc -l)
          echo "=========================================="
          echo "TOTAL_FILE_COUNT=$FILE_COUNT"
          echo "=========================================="
