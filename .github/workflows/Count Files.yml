name: Count Files
on:
  workflow_dispatch: {}
jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and count
        run: |
          git clone https://github.com/k0inwork/test.git repo
          COUNT=$(find repo -not -path '*/.git/*' -type f | wc -l)
          echo "FILE_COUNT=$COUNT"
          echo "FILE_COUNT=$COUNT" >> $GITHUB_ENV
      - name: Output result
        run: |
          echo "===FILE_COUNT_RESULT==="
          echo "$FILE_COUNT"
          echo "===END==="
